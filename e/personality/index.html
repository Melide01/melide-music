<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melide - Test de personalité</title>

    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <textarea disabled autocorrect="off" autocapitalize="off" autocomplete="off"></textarea>

    <main id="welcome" class="ver" style="gap: calc(var(--padding)/3); align-items: center;">
        <img src="/assets/mld_logo_all_white.png" style="width: 3em;">
        <h1 style="text-align: center;">Melide Personalities</h1>
        <a onclick="start_test()">Commencer</a>
        <a onclick="go_to(personality)">Voir toutes les personalités</a>
        <a href="/">Visiter le site internet</a>
    </main>

    <main id="personality" class="ver close">
        <a onclick="go_to(welcome)">Retour</a>
        <h1>Toutes les personalités</h1>
        
    </main>

    <main id="test_env" class="ver close">
        <h1></h1>
        <div class="ver" style="gap: calc(var(--padding)/3);"></div>
    </main>

    <main id="page" class="ver close" style="gap: calc(var(--padding)/3);">
        <div class="meta">
            <img src="" alt="image">
            <div class="ver">
                <h2></h2>
                <h5></h5>
                <h1></h1>
                <span></span>
            </div>
        </div>
        <a onclick="start_test()">Recommencer</a>
        <a onclick="go_to(personality)">Voir toutes les personalités</a>
        <a href="/">Visiter le site internet</a>
        <div id="more_content" class="ver"></div>
        
        <table class="compatibility">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Compatibilité</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td></td>
                    <td></td>
                </tr>
            </tbody>
        </table>
        
    </main>

    <main id="progress" class="progress" style="--percentage: 0%"></main>
</body>
</html>
