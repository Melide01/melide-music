<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melide - Page Editor</title>
    <link rel="stylesheet" href="/main.css">
    <script defer type="module" src="script.js"></script>
    <script src="https://kit.fontawesome.com/22e9bcee35.js" crossorigin="anonymous"></script>
</head>
<body>
    <div>
        <header>
            <img alt="logo" src="/assets/mld_logo_all_white.png">
            <h2 style="font-family: Melide; font-weight: 100; font-size: 2.6em; color: #fff; flex: 1;">Melide</h2>
            <div class="hor">
                <a><i class="fa-solid fa-house"></i>
                    <p>Accueil</p>
                </a>
                <a><i class="fa-solid fa-file"></i>
                    <p>Canons</p>
                </a>
                <a><i class="fa-solid fa-paperclip"></i>
                    <p>Contact</p>
                </a>
            </div>
        </header>
    </div>

    <main><img src="/assets/bg_artistic_underwater_contrasted.webp" style="height: 5em;"></main>

    <style>
        dialog {
            z-index: 1;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            --gap: 1em;
            width: calc(100% - var(--gap)); height: calc(100% - var(--gap));
            padding: calc(var(--gap) / 2);
            overflow-y: auto;
        }
        textarea { all: unset; box-sizing: border-box; outline: 1px solid #aaa; padding: var(--padding); }
    </style>
   
    <dialog id="render_dialog">
        <button onclick="render_dialog.open = false" style="position: absolute; top: calc(var(--gap) / 2); right: calc(var(--gap) / 2);">Close</button>
        <h5>Rendu</h5>
        <div id="render_container"></div>
    </dialog>

    <main class="padding">
    
        <div class="basicContainer">
            <h3>Éditeur de texte</h3>
            <div style="display: flex; flex-direction: row; gap: .25em; margin-bottom: .25em;">
                <button onclick="handle_render()">Voir le rendu</button>
                <button onclick="output_text.value = generate_output()">Convertir</button>
            </div>
            <textarea id="input_text" style="width: 100%; height: 25em; resize: none; overflow: auto;"></textarea>
        </div>
    
    </main>

    <main class="padding">

        <div class="basicContainer">
            <div style="display: flex; flex-direction: row; gap: .25em; margin-bottom: .25em;">
                <button onclick="handle_copy()">Copier</button>
                <button onclick="handle_revert()">Revert</button>
            </div>
            
            <textarea id="output_text" style="font-family: monospace; width: 100%; height: 25em; resize: none; overflow: auto;">Votre texte...</textarea>
        </div>

    </main>

    <div class="padding ver">
        <footer class="hor align">
            <img src="/assets/mld_logo_all_white.png" style="object-fit: contain; height: 3em; flex: 1;">
            <div class="box_wrap">
                <ul>
                    <label>Pages</label>
                    <li><a href="#">Accueil</a></li>
                    <li><a href="#">Canons</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
                <ul>
                    <label>Légales</label>
                    <li><a href="#">Politique sur la confidentialité des données</a></li>
                    <li><a href="#">Mentions légales</a></li>
                    <li><a href="#">Charte IA</a></li>
                </ul>
            </div>
        </footer>
    </div>
</body>
</html>
