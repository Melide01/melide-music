<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiDe</title>
    <link rel="stylesheet" href="lide.css">
    <script defer type="module" src="script.js"></script>
    <script src="https://kit.fontawesome.com/22e9bcee35.js" crossorigin="anonymous"></script>
</head>
<body>

    <input style="display: none;" id="project_loader" type="file" accept=".json,application/json,application/JSON">

    <main id="side_menu">
        <div class="ver" style="padding-top: calc(var(--padding)*4);">
            <h1>LiDe</h1>
            <span class="space">by Melide</span>
            <ul>
                <li><a>Nouveau</a></li>
                <li><a onclick="project_loader.click()">Charger le fichier</a></li>
                <li class="space"><a>Sauvegarder</a></li>
                <li class="space"><a>Contact</a></li>
                <li class="space"><a href="/" onclick="event.preventDefault(); animateTransition(this.href);">Quitter</a></li>

            </ul>
        </div>
        <input type="button" onclick="document.querySelector('header>label>i>input').checked = false" style="position: absolute; width: 100%; top: 0; left: 0; height: 100%; opacity: 0; z-index: -1;">
    </main>

    <!-- CONTENT -->
    <div>
        <header class="hor">
            <img alt="logo" src="/assets/mld_logo_all_white.png">
            <label for="side_menu">
                <i class="fa-solid fa-bars">
                    <input name="side_menu" type="checkbox">
                </i>
            </label>
            <h2 class="ver align" style="flex: 1;">LiDe</h2>
        </header>
        <div class="hor align center extend padding">
            <div class="hor extend">
                <button class="except"><i class="fa-solid fa-backward-step"></i></button>
                <button class="except"><i class="fa-solid fa-play"></i></button>
                <button class="except"><i class="fa-solid fa-forward-step"></i></button>
                <input type="range" step=".0001">
                
            </div>
            
        </div>
    </div>

    <main class="ver nogap" id="intrument_container">

        <div class="hor card nogap">
            <img src="/assets/placeholder.webp" onclick="this.parentElement.querySelector('.meta>.hor>.hor>input').checked = false">
            
            <div class="ver meta extend nogap">
                <div class="hor align nopadding" style="justify-content: space-between;">
                    <input type="text" placeholder="Name..." value="Instrument Name">
                    
                    <div class="hor align right nopadding">
                        <a><i class="fa-solid fa-plug"></i></a>
                        <a><i class="fa-solid fa-trash"></i></a>
                    </div>
                </div>
                
                <div class="hor extend nopadding" style="height: 3em;">
                    <select>
                        <option selected value="synth">DrumKit</option>
                        <option value="synth">Sampler</option>
                        <option value="synth">Synth</option>
                    </select>
                    <div class="options hor nopadding nogap align right">
                        <input type="range">
                        <input type="range">
                    </div>
                    
                </div>
            </div>

            <div class="hor melody_section except">
                <div class="block"></div>
                <div class="block"></div>
                <div class="block"></div>
            </div>
        </div>

    </main>


    <main class="ver padding">
        <button><i class="fa-solid fa-add"></i></button>
    </main>
</body>
</html>
