<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melide</title>
    <link rel="stylesheet" href="/main.css">
    <script defer type="module" src="script.js"></script>
    <script src="https://kit.fontawesome.com/22e9bcee35.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- MODAL -->
    <main class="modal">
        <dialog id="main_modal">
            <i class="fa-solid fa-close" onclick="toggle_modal(this.parentElement)"></i>
            <div class="hor align header">
                <h2>Title</h2>
            </div>
            <div class="ver body align"></div>
            <div class="hor footer"></div>
        </dialog>
    </main>

    <!-- CONTENT -->
    <div style="background-color: #a02;">
        <header>
            <img alt="logo" src="/assets/mld_logo_all_white.png" title="Retourner à l'accueil" onclick="animateTransition('/')">
            <h2 style="font-family: Melide; font-weight: 100; font-size: 2.6em; color: #fff; flex: 1;">Merch</h2>
            <div class="hor">
                <a><i class="fa-solid fa-paperclip"></i>
                    <p>Contact</p>
                </a>
                <a class="except"><i class="fa-solid fa-bag-shopping"></i>
                    <p>Mon panier</p>
                </a>
            </div>
        </header>
    </div>


    <main><img src="/assets/bg_ps.webp" style="height: 5em;"></main>
    
    <main class="open section conditional" style="--bg: #a11; --color: #fff;">
        <label>Merch</label>
    </main>

    <main class="open conditional ver padding selection">
        <button onclick="return_home()"><i class="fa-solid fa-arrow-left"></i></button>

        <div class="hor align selection_header">
            <label>Nouveautés<input name="type" value="new" type="radio" onclick="console.log(this.value)"></label>
            <span>/</span>
            <label><a href="#" class="question" onclick="//canon_modal_info.open()">?</a>Édition limitée<input name="type" value="limited_edition" type="radio" onclick="console.log(this.value)"></label>
            <span>/</span>
            <label>Tout<input checked name="type" value="all" type="radio" onclick="console.log(this.value)"></label>
        </div>
        
    </main>

    <main id="search_content" class="open conditional">
        
        <div id="search_panel" class="hor nogap search_panel">
            <input type="search" placeholder="Rechercher...">
            <input type="button" value="Rechercher">
            <select>
                <option>Récents</option>
                <option>Vieux</option>
            </select>
        </div>
        
        <div id="loading_block" class="load"></div>
        <div class="auto_fill padding" id="project_container" style="--size: 10em;"></div>
    </main>

    <main id="page_content" class="ver padding page">
        
        <div class="shop_display">
            <img class="product_img" src="/assets/placeholder.webp">
            
            
            <div class="meta ver extend">
                
                <div class="ver align">
                    <h1>Shirt</h1>
                    <h3>Melide</h3>
                    <span>...</span>
                </div>

                <div class="hor end align extend" style="gap: calc(var(--padding)*2)">
                    
                    <div class="ver align center extend">
                        <select name="type">
                            <option>S</option>
                            <option>M</option>
                        </select>
                    </div>
                    
                    <h1 style="text-align: end;" name="price">100 €</h1>
                    <!-- <input type="number" value="1" min="1" max="10" name="count"> -->
                    <button style="text-align: center;"><i class="fa-solid fa-bag-shopping"></i></button>
                </div>
            </div>
        </div>

    </main>

    <main class="hor align padding page_navigation conditional">
        <div class="hor" id="page_index" >

            <label>1 <input checked name="page" type="radio"></label>
            <label>2 <input name="page" type="radio"></label>
            <label>3 <input name="page" type="radio"></label>
            <label>4 <input name="page" type="radio"></label>
            <label>5 <input name="page" type="radio"></label>

        </div>
        <div class="hor nogap">
            <input name="page_arrow" type="button" value="<" onclick="section_results(-1)">
            <input name="page_arrow" type="button" value=">" onclick="section_results(1)">
        </div>
    </main>

    <!--
    <main id="container_3d" class="open container_3d">
    </main>
    -->

    <div class="padding ver">
        <footer class="hor align">
            <img src="/assets/mld_logo_all_white.png" style="object-fit: contain; height: 3em; flex: 1;">
            <div class="box_wrap">
                <ul>
                    <label>Pages</label>
                    <li onclick="event.preventDefault(); animateTransition('/');"><a href="/">Accueil</a></li>
                    <li class="disable"><a href="#">Merch</a></li>
                    <li><a href="#">Contact</a></li>
                    <li><a href="/e/" onclick="event.preventDefault(); animateTransition('/e/');">Portals</a></li>
                </ul>
                <ul>
                    <label>Légales</label>
                    <li><a href="#">Politique sur la confidentialité des données</a></li>
                    <li><a href="#">Mentions légales</a></li>
                    <li><a href="#">Charte IA</a></li>
                </ul>
            </div>
        </footer>
    </div>

</body>

</html>
