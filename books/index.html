<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>
    <script src="https://kit.fontawesome.com/22e9bcee35.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/style.css">
    <script defer type="module" src="script.js"></script>
</head>
<body>
    <style>
        body:has(#book_page.open) header {
            position: fixed;
            z-index: 1;
            width: calc(100% - var(--margin) * 2);
            left: 0;
            top: 0;
            max-width: none;
        }
        #book_page > h2, #book_page > p { text-align: justify; }
        #book_page > h1, #book_page > h2 { text-transform: uppercase; }
        #book_page > h1 {
            color: var(--fg-2);
            font-size: .7em; background-color: var(--bg);
            padding: calc(var(--margin) / 3);
        }

        #book_page {
            padding-top: calc(var(--margin) * 2.5) !important;
            font-family: 'Times New Roman', Times, serif;
            color: var(--fg);
            background-color: var(--bg);
            border-radius: 0;
            font-size: 1.5em;
        }

        @keyframes scroll_show {
            from { transform: translateY(-10em); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #book_page > p {
            margin-bottom: calc(var(--margin) * 2);
        }

        #book_page > * {
            animation-name: scroll_show;
            animation-duration: 1s;
            animation-timing-function: linear;
            animation-fill-mode: both;
            animation-timeline: view(y);
            animation-range: entry cover 10em;
        }

        #book_page > img {
            width: 100%;
            height: 2em;
            object-fit: cover;
            transition: height 500ms;
            transition-delay: 0ms;
        }

        #book_page > img:hover {
            height: 20em;
            transition-delay: 1000ms;
        }

        body:has(#book_page.open) input.style_read { display: block; }

        input.style_read {
            all: unset;
            display: none;
            cursor: pointer;
            content: "";
            background-color: var(--bg);
            border: solid .15em var(--fg);
            padding: calc(var(--margin) / 2);
            border-radius: 50%;
            position: relative;
        }

        body:has(.style_read:checked):has(#book_page.open) {
            --bg: #acb;
            --bg-2: #acb;
            --fg: #000;
            --fg-2: #353;
        }

        input.style_read:hover {
            border-color: var(--bg-2);
        }

        input.style_read:checked:hover::after {
            transform: scale(.7);
            background-color: var(--bg-2);
        }

        input.style_read::after {
            content: "";
            background-color: var(--fg);
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            border-radius: 50%;
            transform: scale(0);
            transition: transform 200ms;
        }

        input.style_read:checked::after {
            transform: scale(.8);
        }
    </style>
    <header style="display: flex; gap: calc(var(--margin) / 3); flex-direction: row; align-items: center;">
        <div class="logo">
            <img src="/assets/mld_logo_all_white.png" style="height: 3em;">
        </div>
        <a class="button local" id="return_button">MENU/BACK</a>
        <input type="checkbox" class="style_read">
        <i class="info_button" id="info_button">i</i>
    </header>

    <main id="search_section" class="open">
        <input class="local" type="search" placeholder="Rechercher..." id="search_text_input">
        <input class="local" type="button" value="Rechercher" id="search_button">
        <select id="search_genre">
            <option class="local">GENRES/AVENTURE</option>
            <option class="local">GENRES/THRILLER</option>
            <option class="local">GENRES/TRAGEDIE</option>
        </select>
    </main>
    <main class="open" id="book_section"></main>
    <main id="book_page"></main>

    <dialog id="info_modal">
        <i class="close_button" id="close_modal_button">X</i>
        <img src="/assets/backroom.png">
        <h1>Title</h1>
        <span>Description</span>
    </dialog>

    <main id="langage_section" class="open septcent-regular">
        <ul style="list-style-type: none; text-align: center;"></ul>
    </main>

</body>
</html>
