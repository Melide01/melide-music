<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>
    <script src="https://kit.fontawesome.com/22e9bcee35.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/style.css">
    <script defer type="module" src="script.js"></script>
</head>
<body>
    <style>
        body {
            overflow-x: hidden;
            anchor-name: --body;
        }
        body:has(#book_page.open) header {
            position: fixed;
            z-index: 1;
            width: calc(100% - var(--margin) * 2);
            left: 0;
            top: 0;
            max-width: none;
        }
        #book_page > h1, #book_page > h2 { text-transform: uppercase; transition: background-color 200ms; }
        #book_page > h1 {
            color: var(--fg-2);
            font-size: .7em; background-color: var(--bg);
            padding: calc(var(--margin) / 3);
        }

        #book_page {
            
            padding: calc(var(--margin) / 3);
            margin-top: calc(var(--margin) * 3.25) !important;
            font-family: 'Times New Roman', Times, serif;
            color: var(--fg);
            background-color: var(--bg);
            
            border-radius: .5emem;
            corner-shape: superellipse(-.5);
            font-size: 1.3em;
        }

        #book_page p {
            widows: 3;
            orphans: 3;
        }

        @keyframes scroll_show {
            from {
                transform:
                    translateY( calc(var(--animation-height) * -1) )
                    perspective(100px)
                    rotateX(-5deg)
                    ;
                opacity: 0; }
            to {
                transform:
                    translateX(0)
                    perspective(100px)
                    rotateX(0)
                ;
                opacity: 1; }
        }

        #book_page > p {
            margin-bottom: calc(var(--margin) * 1);
        }

        #book_page > * {
            transform-origin: 50% 0;
            --animation-height: 5em;
            animation-name: scroll_show;
            animation-duration: 1s;
            animation-timing-function: linear;
            animation-fill-mode: both;
            animation-timeline: view(y);
            animation-range: entry cover var(--animation-height);
        }

        #book_page > img {
            width: 100%;
            height: 2em;
            object-fit: cover;
            transition: height 500ms;
            transition-delay: 0ms;
        }

        #book_page > img:hover {
            height: 20em;
            transition-delay: 1000ms;
        }

        body:has(#book_page.open) input.style_read { display: block; }

        input.style_read {
            all: unset;
            display: none;
            cursor: pointer;
            content: "";
            background-color: var(--bg);
            border: solid .15em var(--fg);
            padding: calc(var(--margin) / 2);
            border-radius: 50%;
            position: relative;
        }

        body:has(.style_read:checked):has(#book_page.open) {
            --bg: #acb;
            --bg-2: #acb;
            --fg: #000;
            --fg-2: #353;
        }

        input.style_read:hover {
            border-color: var(--bg-2);
        }

        input.style_read:checked:hover::after {
            transform: scale(.7);
            background-color: var(--bg-2);
        }

        input.style_read::after {
            content: "";
            background-color: var(--fg);
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            border-radius: 50%;
            transform: scale(0);
            transition: transform 200ms;
        }

        input.style_read:checked::after {
            transform: scale(.8);
        }

        #info_modal > ul > li {
            font-weight: 100;
            background-color: #0001;
            padding: calc(var(--margin) / 4);
            transition: padding 100ms;
            position: relative;
        }

        #info_modal > ul > li:active {
            background-color: #0000 !important;
            padding-left: 0 !important;
        }

        #info_modal > ul > li:hover {
            background-color: #0004;
            padding-left: calc(var(--margin) / 3);
        }

        #info_modal > ul > li:hover::after {
            animation: blink 500ms infinite linear;
        }

        #info_modal > ul > li::after {
            content: "";
            opacity: 0;
            height: 100%; width: .5em;
            background-color: #353;
            position: absolute;
            z-index: 1;
            top: 0;
            left: -1.25em;
        }

        @keyframes blink {
            0%, 100% { opacity: 0;}
            50% { opacity: 1; }
        }

        @keyframes blink_notify {
            100% {
                transform: translateX(0);
            }
            5%, 10%, 20%, 40%, 60% {
                transform: translateX(1em);
            }
        }

        h1.notify {
            background-color: var(--fg-2) !important;
        }

        #info_modal > ul {
            display: flex;
            list-style-type: none;
            flex-direction: column;
            gap: calc(var(--margin) / 8);
            font-size: 1.25em;
            border: solid 1px var(--bg);
            border-top: solid 2px var(--bg);
            border-bottom: solid 8px var(--bg);
            padding: calc(var(--margin) / 2) calc(var(--margin) * 1);
            
        }

        body:has(#info_modal:open) .backdrop {
            opacity: 1;
            pointer-events: all;
        }

        .backdrop {
            position: fixed;
            pointer-events: none;
            opacity: 0;
            width: 100%;
            height: 100%;
            background-color: #222a;
            top: 0;
            left: 0;
            z-index: 1;
            transition: opacity 250ms;
        }
    </style>
    <header style="display: flex; gap: calc(var(--margin) / 3); flex-direction: row; align-items: center;">
        <div class="logo">
            <img src="/assets/mld_logo_all_white.png" style="height: 3em;">
        </div>
        <a class="button local" id="return_button">MENU/BACK</a>
        <input type="checkbox" class="style_read">
        <i class="info_button" id="info_button">i</i>
    </header>

    <main id="search_section" class="open">
        <input class="local" type="search" placeholder="Rechercher..." id="search_text_input">
        <input class="local" type="button" value="Rechercher" id="search_button">
        <select id="search_genre">
            <option class="local">GENRES/AVENTURE</option>
            <option class="local">GENRES/THRILLER</option>
            <option class="local">GENRES/TRAGEDIE</option>
        </select>
    </main>
    <main class="open" id="book_section"></main>
    <main id="book_page"></main>

    <div class="backdrop"></div>

    <dialog id="info_modal">
        <i class="close_button" id="close_modal_button">X</i>
        <img src="/assets/backroom.png">
        <h1>Title</h1>
        <span>Description</span>
        <ul></ul>
    </dialog>

    <main id="langage_section" class="open septcent-regular">
        <ul style="list-style-type: none; text-align: center;"></ul>
    </main>

</body>
</html>
