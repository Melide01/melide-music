<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>
    <script src="https://kit.fontawesome.com/22e9bcee35.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/style.css">
    <script defer type="module" src="script.js"></script>
</head>
<body>
    <header style="display: flex; gap: calc(var(--margin) / 3); flex-direction: row; align-items: center;">
        <div class="logo">
            <img src="/assets/mld_logo_all_white.png" style="height: 3em;">
        </div>
        <a class="button local" id="return_button">MENU/BACK</a>
        <i class="info_button" id="info_button">i</i>
    </header>

    <main id="search_section" class="open">
        <input class="local" type="search" placeholder="Rechercher..." id="search_text_input">
        <input class="local" type="button" value="Rechercher" id="search_button">
        <select id="search_genre">
            <option class="local">GENRES/AVENTURE</option>
            <option class="local">GENRES/THRILLER</option>
            <option class="local">GENRES/TRAGEDIE</option>
        </select>
    </main>
    <main class="open" id="book_section"></main>
    <main id="book_page"></main>

    <dialog id="info_modal">
        <i class="close_button" id="close_modal_button">X</i>
        <img src="/assets/backroom.png">
        <h1>Title</h1>
        <span>Description</span>
    </dialog>

    <main id="langage_section" class="open septcent-regular">
        <ul style="list-style-type: none; text-align: center;"></ul>
    </main>

</body>
</html>
