<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <script src="https://kit.fontawesome.com/22e9bcee35.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header style="display: flex; gap: calc(var(--margin) / 3); flex-direction: row; align-items: center;">
        <div class="logo">
            <img src="/assets/mld_logo_all_white.png" style="height: 3em;">
        </div>
        <a class="button" href="/">Retour</a>
    </header>

    <main class="open mood_grid" id="moodgrid">
        <img src="/assets/oop_cover - Copie.png">
        <img src="/assets/placeholder.webp">
    </main>

    <main class="open auto_horizontal">
        <div class="gradient bg"></div>
        <div class="gradient fg"></div>
        <div class="gradient sg"></div>
    </main>

    <main class="open ver fontdisplay">
        <label class="italiana-regular">Italiana</label>
        <label class="antic-didone-regular">Antic Didone</label>
        <span class="separator"></span>
        <label class="despair-regular">AuNomDuDesespoir</label>
        <label class="septcent-regular">SeptCentSoixanteDix</label>
        <label class="fukdat-regular">Fukdat</label>
        <label class="melide-regular">Melide</label>
    </main>

</body>
</html>
